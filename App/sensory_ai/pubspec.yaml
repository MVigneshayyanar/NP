name: sensory_ai
description: Sensory AI - Room environment analysis for sensory comfort
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Networking
  dio: ^5.4.3
  
  # Storage & Auth
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  
  # Camera & Media
  camera: ^0.11.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  
  # Navigation
  go_router: ^14.2.7
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/applogo.png


